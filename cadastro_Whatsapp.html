<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro Whatsapp - Loja de Veículos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="cabecalho">
        <div class="logo"><span>Loja de Veículos</span></div>
        <nav>
            <ul class="menu-navegacao">
                <li><a href="http://127.0.0.1:5000/">Voltar para Home</a></li>
            </ul>
        </nav>
    </header>

    <main style="padding: 20px; max-width: 500px; margin: 0 auto;">
        <h2>Receber Novidades via WhatsApp</h2>
        <p>Cadastre-se para receber ofertas exclusivas de leilão diretamente no seu celular.</p>

        <section style="background-color:#f9f9f9; padding:20px; border-radius:8px; margin-top:20px;">
            <form action="#" method="POST">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome" required style="width: 100%; margin-bottom: 15px;">

                <label for="tel">WhatsApp:</label>
                <input type="text" name="tel" placeholder="(00) 00000-0000" required style="width: 100%; margin-bottom: 15px;">

                <label>
                    <input type="checkbox" required> Aceito receber mensagens da Loja de Veículos.
                </label>

                <button type="submit" style="display: block; width: 100%; margin-top: 20px; padding: 10px; background-color: #25d366; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                    CADASTRAR AGORA
                </button>
            </form>
        </section>
    </main>

    <footer style="text-align: center; padding: 20px; color: #666; font-size: 12px;">
        <p>&copy; 2026 Loja de Veículos</p>
    </footer>
</body>
</html>
