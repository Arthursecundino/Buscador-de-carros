<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; }
        form {
            display: flex; flex-direction: column; align-items: center;
            max-width: 400px; margin: 50px auto; padding: 20px;
            background: #fff; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        label { margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 20px; padding: 10px 20px; background-color: #6c63ff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #4b45c7; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">Login</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}

        {% for category, message in messages %}

            <div>
                {{ message }}
            </div>

        {% endfor %}

    {% endif %}
{% endwith %}
   <form action="/login" method="POST">

    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email" required>

    <label for="senha">Senha:</label>
    <input type="password" id="senha" name="senha" required>

    <button type="submit">Entrar</button>
</form>
</body>
</html>
